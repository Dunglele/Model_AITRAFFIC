<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Traffic Hub - {% block title %}Dashboard{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #060e20; color: #dee5ff; }
        .navbar { background-color: rgba(6, 14, 32, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(161, 250, 255, 0.1); }
        .card { background-color: #0f1930; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; transition: 0.3s; }
        .card:hover { border-color: #a1faff; }
        .text-primary-ai { color: #a1faff; }
        .bg-primary-ai { background-color: #a1faff; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary-ai" href="/">AI TRAFFIC HUB</a>
            <div class="d-flex align-items-center">
                <span class="badge bg-success rounded-pill me-3" style="font-size: 0.7rem;">LIVE SYSTEM</span>
                <!-- <div class="rounded-circle bg-secondary" style="width: 35px; height: 35px;"></div> -->
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
